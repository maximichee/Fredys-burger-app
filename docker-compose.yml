services:
  postgres:
    image: postgres:16-alpine
    container_name: fredys_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fredys
      POSTGRES_PASSWORD: fredys_secret
      POSTGRES_DB: fredys_burger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fredys_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fredys.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
